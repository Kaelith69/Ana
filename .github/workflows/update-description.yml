name: Update Repository Description

on:
  workflow_dispatch:

permissions: {}

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Set repository description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_TOKEN }}
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: "AI Discord bot your server thinks is a real person. Roasts back, flirts, drops dad jokes. Powered by Groq Llama-4 + Gemini. Indistinguishable from a chaotic 20-something. Dangerous."
            });
            console.log("Repository description updated successfully.");
